name: Python CI, Docker Build, and Publish

on:
  push:
    branches: [ "main" ]

# Grant the pipeline permissions to write packages to your GitHub profile
permissions:
  packages: write
  contents: read

jobs:
  # JOB 1: Run the tests (Unchanged)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests with pytest
        run: pytest test_calculator.py

  # JOB 2: Build and Push Docker Image (Upgraded!)
  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: test-and-lint
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # New Step: Convert the repo name to lowercase and save it as an environment variable
      - name: Convert repository name to lowercase
        run: |
          echo "REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV


      # Step 2: Log into the GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and Push the image
      # Note: We must convert the username to lowercase using github.repository_owner
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/my-python-app:latest
